name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Verify WAV file exists (cross-platform)
        shell: ${{ matrix.os == 'windows-latest' && 'pwsh' || 'bash' }}
        run: |
          if (${{ matrix.os == 'windows-latest' }}) {
            # PowerShell for Windows
            $wavPath = "Assets\Turbo_Cybersecurity.wav"
            if (-Not (Test-Path $wavPath)) {
                Write-Host "Error: WAV file 'Turbo_Cybersecurity.wav' not found!"
                exit 1
            } else {
                Write-Host "WAV file found."
            }
          } else {
            # Bash for Linux/macOS
            if [ ! -f "Assets/Turbo_Cybersecurity.wav" ]; then
              echo "Error: WAV file 'Turbo_Cybersecurity.wav' not found!"
              exit 1
            else
              echo "WAV file found."
            fi
          }

      - name: Build project
        run: dotnet build
