name: Build and Test TurboSecurityBot

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: dotnet restore ./TurboSecurityBot.csproj

      - name: Build project
        run: dotnet build ./TurboSecurityBot.csproj --configuration Release

      - name: Run TurboSecurityBot
        run: dotnet run --project ./TurboSecurityBot.csproj
        env:
          GITHUB_ACTIONS: true
