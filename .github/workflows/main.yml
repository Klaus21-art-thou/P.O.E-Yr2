# File: .github/workflows/chatbot-ci.yml
name: Build and Run Turbo Security Chatbot

# Trigger workflow on push or PR to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-run:
    runs-on: windows-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'  # Match your local SDK version

      # 3️⃣ Restore dependencies (point to your .csproj)
      - name: Restore dependencies
        run: dotnet restore "P.O.E Yr2/P.O.E Yr2.csproj"

      # 4️⃣ Build the project
      - name: Build project
        run: dotnet build "P.O.E Yr2/P.O.E Yr2.csproj" --configuration Release --no-restore

      # 5️⃣ Verify WAV file exists
      - name: Verify WAV file
        run: |
          if [ ! -f "P.O.E Yr2/Assets/Turbo_Cybersecurity.wav" ]; then
            echo "Error: WAV file 'Turbo_Cybersecurity.wav' not found!"
            exit 1
          else
            echo "WAV file found."
          fi

      # 6️⃣ Run the chatbot (skip audio in CI)
      - name: Run chatbot
        run: dotnet run --project "P.O.E Yr2/P.O.E Yr2.csproj"
        env:
          GITHUB_ACTIONS: true  # Used in Program.cs to skip SoundPlayer
