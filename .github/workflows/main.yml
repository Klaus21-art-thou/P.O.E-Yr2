# File: .github/workflows/chatbot-ci.yml
name: Build and Run Turbo Security Chatbot

# Trigger workflow on push or PR to main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-run:
    runs-on: windows-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      # 3️⃣ Restore dependencies (in project folder)
      - name: Restore dependencies
        run: dotnet restore
        working-directory: "P.O.E Yr2"

      # 4️⃣ Build the project
      - name: Build project
        run: dotnet build --configuration Release --no-restore
        working-directory: "P.O.E Yr2"

      # 5️⃣ Verify WAV file exists
      - name: Verify WAV file
        run: |
          if [ ! -f "Assets/Turbo_Cybersecurity.wav" ]; then
            echo "Error: WAV file 'Turbo_Cybersecurity.wav' not found!"
            exit 1
          else
            echo "WAV file found."
          fi
        working-directory: "P.O.E Yr2"

      # 6️⃣ Run the chatbot (skip audio in CI)
      - name: Run chatbot
        run: dotnet run
        working-directory: "P.O.E Yr2"
        env:
          GITHUB_ACTIONS: true  # Used in Program.cs to skip SoundPlayer
