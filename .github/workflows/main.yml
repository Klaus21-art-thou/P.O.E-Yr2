# This is a Github Actions workflow that builds and tests the .NET project.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '5.0.x'

      - name: Restore dependencies
        run: dotnet restore "P.O.E Yr2/P.O.E Yr2/P.O.E Yr2.csproj"

      - name: Build project
        run: dotnet build "P.O.E Yr2/P.O.E Yr2/P.O.E Yr2.csproj" --configuration Release --no-restore

      - name: Run tests
        run: dotnet test "P.O.E Yr2/P.O.E Yr2/P.O.E Yr2.csproj" --no-restore --verbosity normal

      - name: Check for WAV files
        run: |
          if (!(Test-Path 'path/to/wavfile.wav')) {
            Write-Error 'WAV file not found!'
            exit 1
          }
